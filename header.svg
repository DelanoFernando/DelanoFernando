<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="55%"  stop-color="#0d2662"/>
      <stop offset="100%" stop-color="#133080"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#c8d8f0"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7ab8ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .name {
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
        font-size: 42px; font-weight: 300; letter-spacing: 4px;
        fill: url(#nameGrad); filter: url(#glow);
        animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .rule { animation: fadeIn 1.8s ease forwards; }
      .desc {
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
        font-size: 11.5px; font-weight: 400; letter-spacing: 1.5px;
        fill: #8899bb; animation: fadeIn 2.2s ease forwards;
      }
    </style>
  </defs>
  <rect width="900" height="200" fill="url(#bgGrad)"/>
  <ellipse cx="820" cy="30"  rx="180" ry="100" fill="#0077ff" opacity="0.05"/>
  <ellipse cx="80"  cy="170" rx="120" ry="80"  fill="#0077ff" opacity="0.06"/>
  <path d="M0,168 C80,152 180,178 300,165 C420,152 520,178 640,165 C760,152 850,170 900,162 L900,200 L0,200 Z"
        fill="#0077ff" opacity="0.10"/>
  <path d="M0,178 C100,165 220,188 380,176 C540,164 680,188 820,176 C870,170 895,177 900,174 L900,200 L0,200 Z"
        fill="#0077ff" opacity="0.20"/>
  <path d="M0,188 C150,178 320,195 500,185 C680,175 800,193 900,183 L900,200 L0,200 Z"
        fill="#0077ff" opacity="0.40"/>
  <text x="450" y="100" text-anchor="middle" class="name">Delano Fernando</text>
  <line x1="355" y1="116" x2="545" y2="116" stroke="#0077ff" stroke-width="0.6" opacity="0.5" class="rule"/>
  <text x="450" y="140" text-anchor="middle" class="desc">Marketing Operations &#xB7; Systems &amp; Automation &#xB7; Colombo, Sri Lanka</text>
</svg>